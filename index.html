<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini-libreria — Settimana VII Giorno I</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <header class="site-header">
    <h1>La mia libreria</h1>
    <p>Aggiungi i tuoi libri e segnali come letti.</p>
  </header>

  <main class="container">

    <section class="form-section">
      <!-- form per aggiungere un libro: titolo, autore, anno, formato (cartaceo/digitale) -->
      <h2>Aggiungi un libro</h2>
      <form id="aggiungi-libro" class="form">
        <div class="campo">
          Titolo <input type="text" placeholder="Titolo del libro">
        </div>
        <div class="campo">
          Autore <input type="text" placeholder="Autore del libro">
        </div>
        <div class="campo">
          Anno <input type="number" placeholder="Anno di pubblicazione del libro">
        </div>
        <div class="campo">
          Formato <select id="formato">
            <option value="cartaceo">Cartaceo</option>
            <option value="digitale">Digitale</option>
          </select>
        </div>
        <div class="campo campo-condizionale" id="campo-dimensione" hidden>
          Dimensione MB <input type="number" step="0.1">
        </div>
        <button type="submit" class="btn-primary">Aggiungi</button>
      </form>
    </section>

    <section class="lista-section">
      <h2>I tuoi libri (<span id="contatore">0</span>)</h2>
      
      <ul id="lista-libri">
        <!-- popolato da JavaScript -->
      </ul>
    </section>

  </main>

  <script src="assets/js/script.js"></script>
</body>

</html>
